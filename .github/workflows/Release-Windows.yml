name: Release-win-x86_64-aarch64-zip-msi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

  pull_request:  # fires on every push to any open PR branch
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86
            runner: windows-latest
            python_url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260211/cpython-3.12.12+20260211-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
            python_sha256: "93bf8e8c05ede0077b197a29c99ebdaf253497f27190097494265150b4e70ba8"
          
          - target: aarch64-pc-windows-msvc
            arch: arm64
            runner: windows-11-arm
            python_url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260414/cpython-3.13.13+20260414-aarch64-pc-windows-msvc-install_only_stripped.tar.gz"
            python_sha256: "d0facb213d81b8c2133804f8e382d7af92c971c087bfbc77cd8c761a56223eac"
    
    runs-on: ${{ matrix.runner }}
    env:
      BINARY_NAME: adqa-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.0.0' }}-${{ matrix.target }}

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # - name: Setup MSVC for ARM64
      #   if: matrix.arch == 'arm64'
      #   uses: ilammy/msvc-dev-cmd@v1 # TheMrMilchmann/setup-msvc-dev@v4
      #   with:
      #     arch: arm64
      #     toolset: 14.0

      # - name: Fix PATH (prioritize MSVC over Git)
      #   if: matrix.arch == 'arm64'
      #   shell: cmd
      #   run: |
      #     set PATH=C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\14.44.35207\bin\HostARM64\arm64;%PATH%
      #     ren "C:\Program Files\Git\usr\bin\link.exe" link.exe.bak

      - name: Setup Standalone Python
        shell: bash
        run: |
          mkdir -p standalone_python
          cd standalone_python
          curl -sfSL "${{ matrix.python_url }}" -o python.tar.gz
          
          # checksum check
          echo "${{ matrix.python_sha256 }}  python.tar.gz" | sha256sum -c -
          
          tar -xf python.tar.gz
          mv python/ ../python_env
          cd ..
     
      - name: Install Backend Packages aarch64
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          curl -L -o arm_wheels.zip https://github.com/cgohlke/win_arm64-wheels/releases/download/v2025.3.31/2025.3.31-experimental-cp313-win_arm64.whl.zip
          unzip arm_wheels.zip -d .
          mv ./v2025.3.31/2025.3.31-experimental-cp313-win_arm64.whl ./local_wheels/
          
          rm pyproject.toml
          cp pyproject-Win-ARM64.toml pyproject.toml
          ./python_env/python.exe -m pip install . --find-links ./local_wheels --prefer-binary

          mv ./python_env/python.exe ./python_env/python.exe_disable
          mv ./python_env/pythonw.exe ./python_env/pythonw.exe_disable


      - name: Install Backend Packages x86_64
        if: matrix.arch == 'x86'
        shell: bash
        run: |
            ./python_env/python.exe -m pip install .

            mv ./python_env/python.exe ./python_env/python.exe_disable
            mv ./python_env/pythonw.exe ./python_env/pythonw.exe_disable

      - name: Build TUI
        working-directory: adqa-tui
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Standalone Package
        shell: bash
        run: |
            mkdir -p ${{ env.BINARY_NAME }}/bin
            cp -r python_env/* ${{ env.BINARY_NAME }}/bin
            cp adqa-tui/target/${{ matrix.target }}/release/adqa-tui.exe ${{ env.BINARY_NAME }}/bin/
            cp adqa-tui/target/${{ matrix.target }}/release/adqa-cli.exe ${{ env.BINARY_NAME }}/bin/
            cp README.md LICENSE ${{ env.BINARY_NAME }}/
            mkdir -p ${{ env.BINARY_NAME }}/samples
            cp -r samples/* ./${{ env.BINARY_NAME }}/samples

      - name: Clean and zip
        shell: bash
        working-directory: ${{ env.BINARY_NAME }}
        run: |
            cp ../distribution/win/minify_env_win.sh ./bin/
            ./bin/minify_env_win.sh -y
            rm ./bin/minify_env_win.sh
            cd ..
            7z a -tzip '${{ env.BINARY_NAME }}.zip' './${{ env.BINARY_NAME }}/*'

      - name: Upload Zip to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v0.1.3"
          files: ${{ env.BINARY_NAME }}.zip
          draft: true
          prerelease: true
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI Installer
        run: |
            $env:VERSION = if ("${{ env.BINARY_NAME }}" -match 'v(\d+\.\d+\.\d+)') { $matches[1] }
            wix extension add --global WixToolset.UI.wixext/5.0.2
            Copy-Item ./distribution/win/adqa-installer.wxs ./adqa-installer.wxs
            wix build ./adqa-installer.wxs -arch ${{ matrix.arch }} -ext WixToolset.UI.wixext -o "${{ env.BINARY_NAME }}-installer.msi"

      - name: Upload MSI to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v0.1.3"
          files: ${{ env.BINARY_NAME }}-installer.msi
          draft: true
          prerelease: true