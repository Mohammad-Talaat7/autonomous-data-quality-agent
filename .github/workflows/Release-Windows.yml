name: Release-win-x86_64-zip-msi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  
  pull_request:  # fires on every push to any open PR branch
    branches: [main_disable]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
      BINARY_NAME: adqa-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.0.0' }}-win-x86_64
      
      TUI_NAME: adqa-tui
      CLI_NAME: adqa-cli

      PYTHON_URL: "https://github.com/astral-sh/python-build-standalone/releases/download/20260211/cpython-3.12.12+20260211-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
      PYTHON_SHA256: "93bf8e8c05ede0077b197a29c99ebdaf253497f27190097494265150b4e70ba8"
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Setup Standalone Python
        shell: bash
        run: |
          mkdir -p standalone_python
          cd standalone_python
          curl -sfSL "${{ env.PYTHON_URL }}" -o python.tar.gz
          
          # checksum check
          echo "$PYTHON_SHA256  python.tar.gz" | sha256sum -c -
          
          tar -xf python.tar.gz
          mv python/ ../python_env
          cd ..

      - name: Install Backend Packages into Bundled Python
        shell: bash
        run: |
            ./python_env/python.exe -m pip install .
            mv ./python_env/python.exe ./python_env/python.exe_disable
            mv ./python_env/pythonw.exe ./python_env/pythonw.exe_disable


      - name: Build TUI
        working-directory: adqa-tui
        shell: bash
        run: cargo build --release --target ${{ env.TARGET }}

      - name: Prepare Standalone Package
        shell: bash
        run: |
            mkdir -p ${{ env.BINARY_NAME }}/bin
            cp -r python_env/* ${{ env.BINARY_NAME }}/bin
            cp adqa-tui/target/${{ env.TARGET }}/release/adqa-tui.exe ${{ env.BINARY_NAME }}/bin/${{ env.TUI_NAME }}.exe
            cp adqa-tui/target/${{ env.TARGET }}/release/adqa-cli.exe ${{ env.BINARY_NAME }}/bin/${{ env.CLI_NAME }}.exe

            cp README.md LICENSE ${{ env.BINARY_NAME }}/
            mkdir -p ${{ env.BINARY_NAME }}/samples
            cp -r samples/* ./${{ env.BINARY_NAME }}/samples

      - name: Clean and zip
        shell: bash
        working-directory: ${{ env.BINARY_NAME }}
        run: |
            echo $PWD
            cp ../distribution/win/minify_env_win.sh ./bin/minify_env_win.sh
            ./bin/minify_env_win.sh -y
            rm ./bin/minify_env_win.sh
            cd ..
            7z a -tzip '${{ env.BINARY_NAME }}.zip' './${{ env.BINARY_NAME }}/*'

      # Disable later, just for testing builds manual without publish tags
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v0.1.0-beta" # Disable later
          files: ${{ env.BINARY_NAME }}.zip
          draft: true
          prerelease: true
      
      # Create MSI
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      # Don't update to higher version of wix
      # why? Requires a sponsorship fee once you earn at least $10,000 per year.
      # The fee is about $10 per month for small organizations (<20 people).
      # WiX v5 did not have such a fee.
      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI Installer
        run: |
            $env:VERSION = if ("${{ env.BINARY_NAME }}" -match 'v(\d+\.\d+\.\d+)') { $matches[1] }
            echo $env:VERSION
            echo $PWD
            wix extension add --global WixToolset.UI.wixext/5.0.2
            Copy-Item ./distribution/win/adqa-installer.wxs ./adqa-installer.wxs
            wix build ./adqa-installer.wxs -ext WixToolset.UI.wixext -o "${{ env.BINARY_NAME }}-installer.msi"

      # Disable later, just for testing builds manual without publish tags
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-installer.msi
          path: ${{ env.BINARY_NAME }}-installer.msi

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v0.1.0-beta" # Disable later
          files: ${{ env.BINARY_NAME }}-installer.msi
          draft: true
          prerelease: true