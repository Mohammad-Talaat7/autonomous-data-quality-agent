name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
      - name: Run tests
        run: poetry run pytest

  build-python:
    needs: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install poetry
        run: pip install poetry poetry-dynamic-versioning
      - name: Build package
        run: poetry build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-tui:
    needs: test-python
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            binary_name: adqa-tui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            binary_name: adqa-tui
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            binary_name: adqa-tui-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            binary_name: adqa-tui-aarch64
    runs-on: ${{ matrix.os }}
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build TUI
        working-directory: adqa-tui
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename and Prepare Binary
        shell: bash
        run: |
          mkdir -p bin-out
          cp adqa-tui/target/${{ matrix.target }}/release/adqa-tui${{ matrix.suffix }} bin-out/${{ matrix.binary_name }}${{ matrix.suffix }}
      - name: Upload TUI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.target }}
          path: bin-out/

  publish:
    needs: [build-python, build-tui]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Download TUI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tui-*
          path: binaries/
          merge-multiple: true
      - name: List files
        run: |
          echo "Python dists:"
          ls -R dist/
          echo "TUI binaries:"
          ls -R binaries/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*
            binaries/*
          generate_release_notes: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          packages-dir: dist/
