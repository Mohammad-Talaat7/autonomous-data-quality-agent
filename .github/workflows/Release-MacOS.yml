name: Release-MacOS-x86_64-arm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

  pull_request:  # fires on every push to any open PR branch
    branches: [main]

permissions:
  contents: write

jobs:
  build-macos:
    env: 
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            binary_name: adqa-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.0.0' }}-macos-x86_64
            python_url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260211/cpython-3.12.12+20260211-x86_64-apple-darwin-install_only_stripped.tar.gz"
            PYTHON_SHA256: "a84ac7a36d465bc6eb68db84540fdb5da04333900e2c3cb34b5d454f2022048c"

          - target: aarch64-apple-darwin
            binary_name: adqa-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.0.0' }}-macos-arm64
            python_url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260211/cpython-3.12.12+20260211-aarch64-apple-darwin-install_only_stripped.tar.gz"
            PYTHON_SHA256: "22625deaf5757e7c266cf1a096c9151a06b598b1e14632a2ec9993d58ec5fe84"
    
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Standalone Python
        shell: bash
        run: |
          mkdir -p standalone_python
          cd standalone_python
          curl -sfSL "${{ matrix.python_url }}" -o python.tar.gz
          
          # checksum check
          echo "${{ matrix.PYTHON_SHA256 }}  python.tar.gz" | sha256sum -c -

          tar -xf python.tar.gz
          mv python/ ../python_env
          cd ..
          chmod +x python_env/bin/python3

      - name: Install Backend Packages into Bundled Python
        run: ./python_env/bin/python3 -m pip install .

      - name: Build TUI
        working-directory: adqa-tui
        shell: bash
        run: |
          PYTHON_ROOT_DIR=$(realpath "../python_env")
          LIB_FILE=$(find "$PYTHON_ROOT_DIR" -name "libpython3.12.dylib" | head -n 1)
          LIB_DIR=$(dirname "$LIB_FILE")
          
          cat <<CONF | sed 's/^[[:space:]]*//' > ../pyo3-config.txt
          implementation=CPython
          version=3.12
          shared=true
          lib_name=python3.12
          lib_dir=$LIB_DIR
          pointer_width=64
          build_flags=
          CONF
          
          export PYO3_CONFIG_FILE="$(pwd)/../pyo3-config.txt"
          export RUSTFLAGS="-L $LIB_DIR"
          
          cargo build --release --target ${{ matrix.target }}
      
      - name: Install Dependencies
        run: brew install zstd

      - name: Prepare Standalone Package
        shell: bash
        run: |
          mkdir -p ${{ matrix.binary_name }}
          cp adqa-tui/target/${{ matrix.target }}/release/adqa-tui ${{ matrix.binary_name }}/
          cp adqa-tui/target/${{ matrix.target }}/release/adqa-cli ${{ matrix.binary_name }}/
          cp -r python_env ${{ matrix.binary_name }}/python

          rm -rf ${{ matrix.binary_name }}/python/share ${{ matrix.binary_name }}/python/include
          find ${{ matrix.binary_name }}/python -name "__pycache__" -type d -exec rm -rf {} + || true
          
          # Fix rpath so the binary finds the bundled dylib
          install_name_tool -add_rpath "@executable_path/python/lib" ${{ matrix.binary_name }}/adqa-tui || true
          install_name_tool -add_rpath "@executable_path/python/lib" ${{ matrix.binary_name }}/adqa-cli || true

          tar --use-compress-program='zstd -19' -cf "${{ matrix.binary_name }}.tar.zst" "${{ matrix.binary_name }}/"
      
      # Disable later, just for testing builds manual without publish tags
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}.tar.zst

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v0.1.0-beta" # Disable later
          files: ${{ matrix.binary_name }}.tar.zst
          draft: true
          prerelease: true
