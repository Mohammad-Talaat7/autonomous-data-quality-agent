name: CI Pipeline

on:
  push:
    branches:
      - main_disable # disable_for_while
      - "phase-*"
      - "feature/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main_disable # disable_for_while
      - "phase-*"
      
jobs:
  test-core:
    name: Test Core (Minimal Dependencies)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Install Poetry
        run: |
          pipx install poetry
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry self add poetry-dynamic-versioning

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Install dependencies (minimal)
        run: |
          poetry install --with dev

      - name: Run tests
        run: |
          poetry run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Lint (ruff)
        run: |
          poetry run ruff check src tests
          poetry run ruff format --check src tests

      - name: Formatting (black)
        run: |
          poetry run black --check src tests

      - name: Docstring linting
        run: |
          poetry run pydoclint src --style numpy

      - name: Type checking (mypy)
        run: |
          poetry run mypy src/adqa

  test-full:
    name: Test Full (All Extras)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Install Poetry
        run: |
          pipx install poetry
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry self add poetry-dynamic-versioning

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Install dependencies (all)
        run: |
          # Install all optional dependencies for full test coverage
          poetry install --with dev -E all

      - name: Run tests (full)
        run: |
          poetry run pytest \
            --cov=src \
            --cov-report=xml:coverage-full.xml \
            --cov-report=term

      - name: Upload coverage (full)
        uses: codecov/codecov-action@v5
        with:
          files: coverage-full.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: full
          fail_ci_if_error: false
