name: CI Pipeline

on:
  push:
    branches:
      - main
      - "phase-*"
      - "feature/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - "phase-*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.11"
            test-path: "tests/data_ingress"
            coverage-file: "coverage-data.xml"
          - python-version: "3.12"
            test-path: "tests --ignore=tests/data_ingress"
            coverage-file: "coverage-other.xml"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Install dependencies
        run: |
          poetry env use ${{ matrix.python-version }}
          poetry install --with dev

      - name: Run tests with coverage
        run: |
          poetry run pytest ${{ matrix.test-path }} \
            --cov=src \
            --cov-report=xml:${{ matrix.coverage-file }} \
            --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.coverage-file }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "poetry"

      - name: Install dependencies
        run: |
          poetry install --with dev

      - name: Lint (ruff)
        run: |
          poetry run ruff check src tests
          poetry run ruff format --check src tests

      - name: Formatting (black)
        run: |
          poetry run black --check src tests

      - name: Docstring linting
        run: |
          poetry run pydoclint src --style numpy

      - name: Type checking
        run: |
          poetry run mypy src/adqa