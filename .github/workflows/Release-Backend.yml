# Don't change this file name "Release-Backend.yml" as linked to pypi
name: Release - Backend & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
      - name: Run tests
        run: poetry run pytest

  build-and-publish-python:
    needs: test-python
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install poetry
        run: |
          pip install poetry
          poetry self add "poetry-dynamic-versioning[plugin]"
        
      - name: Build package
        run: poetry build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-tui-crate:
    needs: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Sync Cargo.toml version
        working-directory: adqa-tui
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # sed "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          # change version in line 3
          sed -i "3s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          
          # # Another way but slower
          # cargo install cargo-edit
          # cargo set-version $VERSION
      - name: Publish to crates.io
        working-directory: adqa-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify --allow-dirty
