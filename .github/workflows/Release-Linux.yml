name: Release-Linux-x86_64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
      TARGET: x86_64-unknown-linux-gnu
      BINARY_NAME: adqa-tui-linux-x86_64
      PYTHON_URL: "https://github.com/astral-sh/python-build-standalone/releases/download/20240107/cpython-3.12.1+20240107-x86_64-unknown-linux-gnu-pgo+lto-full.tar.zst"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev libedit-dev libncursesw5-dev libsqlite3-dev libssl-dev libffi-dev libexpat1-dev libbz2-dev liblzma-dev uuid-dev zlib1g-dev tcl-dev tk-dev libx11-dev libxcb1-dev libxau-dev

      - name: Setup Standalone Python
        shell: bash
        run: |
          mkdir -p standalone_python
          cd standalone_python
          curl -sfSL "${{ env.PYTHON_URL }}" -o python.tar.zst
          tar -xf python.tar.zst
          mv python/install ../python_env
          cd ..
          chmod +x python_env/bin/python3

      - name: Install Backend Packages into Bundled Python
        run: ./python_env/bin/python3 -m pip install .

      - name: Sync Cargo.toml version
        working-directory: adqa-tui
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            sed "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          fi

      - name: Build TUI
        working-directory: adqa-tui
        shell: bash
        run: |
          PYTHON_ROOT_DIR=$(realpath "../python_env")
          LIB_SO=$(find "$PYTHON_ROOT_DIR" -name "libpython3.12.so*" | head -n 1)
          if [ -z "$LIB_SO" ]; then
            echo "Error: libpython3.12.so not found"
            exit 1
          fi
          LIB_DIR=$(dirname "$LIB_SO")
          
          cat <<CONF | sed 's/^[[:space:]]*//' > ../pyo3-config.txt
          implementation=CPython
          version=3.12
          shared=true
          lib_name=python3.12
          lib_dir=$LIB_DIR
          pointer_width=64
          build_flags=
          CONF
          
          export PYO3_CONFIG_FILE="$(pwd)/../pyo3-config.txt"
          
          # Use shared linking and set RPATH so the binary finds libpython3.12.so in the bundle
          # $ORIGIN refers to the directory containing the executable
          export RUSTFLAGS="-L $LIB_DIR -Clink-arg=-Wl,-rpath,\$ORIGIN/python/lib"
          
          cargo build --release --target ${{ env.TARGET }}

      - name: Prepare Standalone Package
        shell: bash
        run: |
          mkdir -p adqa-tui-bundle
          cp adqa-tui/target/${{ env.TARGET }}/release/adqa-tui adqa-tui-bundle/${{ env.BINARY_NAME }}
          cp -r python_env adqa-tui-bundle/python
          rm -rf adqa-tui-bundle/python/share adqa-tui-bundle/python/include
          find adqa-tui-bundle/python -name "__pycache__" -type d -exec rm -rf {} + || true
          tar -czf ${{ env.BINARY_NAME }}.tar.gz adqa-tui-bundle/
      
      # Disable later, just for testing builds manual without publish tags
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BINARY_NAME }}.tar.gz
